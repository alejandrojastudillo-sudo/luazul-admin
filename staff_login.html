<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>LUAZUL &middot; Portal de Operaciones</title>

  <!-- Fonts: Syne (brand/headings) + Mulish (body) — per Directive -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Mulish:wght@300;400;600;700&display=swap" rel="stylesheet"/>

  <!-- PWA -->
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="LUAZUL"/>
  <meta name="theme-color" content="#000000"/>
  <link rel="manifest" href="manifest.json"/>

  <style>
    /* ── RESET ── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    /* ── DESIGN TOKENS ── */
    :root{
      --black:     #000000;
      --ink:       #07090f;
      --card-bg:   rgba(6,12,28,.78);
      --card-bdr:  rgba(0,229,255,.18);
      --cyan:      #00e5ff;
      --cyan-dim:  rgba(0,229,255,.55);
      --cyan-glow: rgba(0,229,255,.12);
      --text:      #f0f8ff;
      --muted:     rgba(180,220,255,.65);
      --faint:     rgba(120,180,220,.45);
      --danger:    #ff6b6b;
      --success:   #34d399;
      --font-h:    'Syne',   sans-serif;
      --font-b:    'Mulish', sans-serif;
    }

    /* ── BODY / BG ── */
    html,body{
      min-height:100vh;
      font-family: var(--font-b);
      background: var(--black);
      color: var(--text);
      overflow-x: hidden;
    }
    body::before{                              /* subtle grid texture */
      content:'';
      position:fixed;inset:0;
      background:
        linear-gradient(rgba(0,229,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events:none;z-index:0;
    }
    body::after{                               /* corner glow */
      content:'';
      position:fixed;
      top:-220px;right:-220px;
      width:500px;height:500px;
      border-radius:50%;
      background: radial-gradient(circle, rgba(0,229,255,.07) 0%, transparent 65%);
      pointer-events:none;z-index:0;
    }

    /* ── FLOATING ORBS ── */
    .orb{
      position:fixed;border-radius:50%;
      filter:blur(80px);pointer-events:none;z-index:0;
      animation: drift 14s ease-in-out infinite alternate;
    }
    .orb-1{
      width:320px;height:320px;
      bottom:-80px;left:-80px;
      background:radial-gradient(circle, rgba(0,100,200,.09), transparent 70%);
      animation-delay:-7s;
    }
    .orb-2{
      width:240px;height:240px;
      top:15%;right:-40px;
      background:radial-gradient(circle, rgba(0,229,255,.06), transparent 70%);
    }
    @keyframes drift{
      from{transform:translate(0,0) scale(1);}
      to  {transform:translate(25px,-30px) scale(1.08);}
    }

    /* ── LAYOUT ── */
    .wrap{
      position:relative;z-index:1;
      min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      padding:24px 16px;
    }
    .card{
      background: var(--card-bg);
      border: 1px solid var(--card-bdr);
      border-radius: 20px;
      padding: 44px 40px 36px;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 0 0 1px rgba(0,229,255,.06),
        0 24px 60px rgba(0,0,0,.65),
        inset 0 1px 0 rgba(255,255,255,.04);
      animation: cardIn .55s cubic-bezier(.22,.61,.36,1) both;
    }
    @keyframes cardIn{
      from{opacity:0;transform:translateY(22px);}
      to  {opacity:1;transform:translateY(0);}
    }

    /* ── LOGO AREA ── */
    .logo-area{text-align:center;margin-bottom:26px;}
    .logo-ring{
      width:70px;height:70px;
      border-radius:50%;
      border: 1.5px solid var(--card-bdr);
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 14px;
      box-shadow: 0 0 18px var(--cyan-glow);
      background: rgba(0,229,255,.04);
    }
    .brand{
      font-family:var(--font-h);
      font-size:1.6rem;font-weight:800;
      letter-spacing:4px;text-transform:uppercase;
      background: linear-gradient(120deg, var(--cyan) 0%, #60cfff 60%, #c0eeff 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text;
    }
    .brand-sub{
      font-family:var(--font-b);
      font-size:.7rem;font-weight:600;
      letter-spacing:3px;text-transform:uppercase;
      color:var(--muted);margin-top:3px;
    }

    /* ── BADGE ── */
    .badge{
      display:inline-flex;align-items:center;gap:7px;
      background:rgba(0,229,255,.06);
      border:1px solid rgba(0,229,255,.2);
      border-radius:30px;padding:4px 14px;
      font-family:var(--font-b);
      font-size:.6rem;font-weight:700;letter-spacing:.18em;
      text-transform:uppercase;color:var(--cyan);
      margin-top:10px;
    }
    .badge::before{
      content:'';width:5px;height:5px;border-radius:50%;
      background:var(--cyan);
      animation:blink 2s ease-in-out infinite;
    }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

    /* ── DIVIDER ── */
    .divider{
      height:1px;margin:22px 0 20px;
      background:linear-gradient(90deg,transparent,var(--card-bdr),transparent);
    }

    /* ── FORM ── */
    .fgroup{margin-bottom:16px;}
    .flabel{
      display:block;
      font-family:var(--font-b);
      font-size:.62rem;font-weight:700;
      letter-spacing:.14em;text-transform:uppercase;
      color:var(--faint);margin-bottom:7px;
    }
    .iw{position:relative;}
    .iico{
      position:absolute;left:14px;top:50%;transform:translateY(-50%);
      color:var(--faint);pointer-events:none;
    }
    .finput{
      width:100%;
      background:rgba(0,10,30,.55);
      border:1px solid rgba(0,229,255,.12);
      border-radius:10px;
      padding:11px 14px 11px 40px;
      color:var(--text);
      font-family:var(--font-b);
      font-size:.85rem;font-weight:400;
      outline:none;
      transition:border-color .2s,box-shadow .2s;
      -webkit-appearance:none;
    }
    .finput::placeholder{color:var(--faint);}
    .finput:focus{
      border-color: rgba(0,229,255,.4);
      box-shadow: 0 0 0 3px rgba(0,229,255,.07);
    }

    /* password toggle */
    .ptoggle{
      position:absolute;right:12px;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;
      color:var(--faint);padding:4px;
      transition:color .2s;
    }
    .ptoggle:hover{color:var(--cyan-dim);}

    /* ── LOGIN BUTTON ── */
    .btn-login{
      width:100%;margin-top:8px;
      border:none;cursor:pointer;
      border-radius:10px;
      background:linear-gradient(135deg, #006ea3 0%, #003d6b 100%);
      padding:13px 20px;
      font-family:var(--font-h);
      font-size:.82rem;font-weight:700;
      letter-spacing:.12em;text-transform:uppercase;
      color:var(--cyan);
      position:relative;overflow:hidden;
      transition:opacity .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 0 0 1px rgba(0,229,255,.15), 0 4px 18px rgba(0,0,0,.45);
    }
    .btn-login::before{
      content:'';position:absolute;inset:0;
      background:linear-gradient(135deg, rgba(0,229,255,.1) 0%, transparent 60%);
      pointer-events:none;
    }
    .btn-login:hover:not(:disabled){
      opacity:.92;transform:translateY(-1px);
      box-shadow: 0 0 0 1px rgba(0,229,255,.28), 0 6px 24px rgba(0,229,255,.08);
    }
    .btn-login:active:not(:disabled){transform:translateY(0);}
    .btn-login:disabled{opacity:.55;cursor:not-allowed;}
    .btn-inner{display:flex;align-items:center;justify-content:center;gap:10px;}
    .spinner{
      width:15px;height:15px;
      border:2px solid rgba(0,229,255,.25);
      border-top-color:var(--cyan);
      border-radius:50%;
      animation:spin .75s linear infinite;
      display:none;flex-shrink:0;
    }
    .btn-login.loading .spinner{display:block;}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── FORGOT LINK ── */
    .forgot-btn{
      display:block;width:100%;background:none;border:none;
      cursor:pointer;
      font-family:var(--font-b);
      font-size:.7rem;font-weight:600;
      color:var(--faint);
      text-align:center;margin-top:14px;
      transition:color .2s;
      padding:4px;
    }
    .forgot-btn:hover{color:var(--cyan-dim);}

    /* forgot panel */
    #forgotWrap{
      display:none;
      background:rgba(0,229,255,.03);
      border:1px solid rgba(0,229,255,.1);
      border-radius:10px;
      padding:14px;margin-top:12px;
    }
    .forgot-hint{
      font-family:var(--font-b);
      font-size:.67rem;
      color:var(--faint);
      margin-bottom:9px;
      line-height:1.5;
    }
    .forgot-input{
      width:100%;
      background:rgba(0,10,30,.55);
      border:1px solid rgba(0,229,255,.12);
      border-radius:8px;
      padding:9px 12px;
      color:var(--text);
      font-family:var(--font-b);
      font-size:.82rem;
      outline:none;
      transition:border-color .2s;
      -webkit-appearance:none;
      margin-bottom:9px;
    }
    .forgot-input::placeholder{color:var(--faint);}
    .forgot-input:focus{border-color:rgba(0,229,255,.35);}
    .btn-forgot-send{
      width:100%;
      background:rgba(0,229,255,.08);
      border:1px solid rgba(0,229,255,.2);
      border-radius:8px;
      padding:9px;
      font-family:var(--font-b);
      font-size:.72rem;font-weight:700;
      letter-spacing:.08em;text-transform:uppercase;
      color:var(--cyan);
      cursor:pointer;
      transition:background .2s, opacity .2s;
    }
    .btn-forgot-send:hover:not(:disabled){background:rgba(0,229,255,.14);}
    .btn-forgot-send:disabled{opacity:.5;cursor:not-allowed;}
    #forgotOk{
      display:none;
      font-family:var(--font-b);
      font-size:.68rem;font-weight:600;
      color:var(--success);margin-top:8px;
      text-align:center;
    }
    #forgotErr{
      display:none;
      font-family:var(--font-b);
      font-size:.68rem;
      color:var(--danger);margin-top:8px;
      text-align:center;
    }

    /* ── ERROR BANNER ── */
    .err{
      display:flex;align-items:center;gap:8px;
      background:rgba(255,107,107,.08);
      border:1px solid rgba(255,107,107,.25);
      border-radius:8px;
      padding:9px 12px;
      font-family:var(--font-b);
      font-size:.72rem;color:var(--danger);
      margin-top:12px;
      opacity:0;
      transform:translateY(-4px);
      transition:opacity .25s,transform .25s;
      pointer-events:none;
    }
    .err.show{opacity:1;transform:translateY(0);pointer-events:auto;}

    /* ── FOOTER ── */
    .cfoot{
      margin-top:28px;
      text-align:center;
    }
    .fnote{
      font-family:var(--font-b);
      font-size:.65rem;
      color:var(--faint);
      line-height:1.6;
    }
    .fnote strong{color:rgba(0,229,255,.5);}
    .fver{
      font-family:var(--font-h);
      font-size:.54rem;font-weight:600;
      letter-spacing:.12em;text-transform:uppercase;
      color:rgba(0,229,255,.2);
      margin-top:8px;
    }

    /* ── RESPONSIVE ── */
    @media(max-width:480px){
      .card{padding:34px 22px 28px;}
      .brand{font-size:1.35rem;}
    }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="wrap">
    <div class="card">

      <!-- Logo / Brand -->
      <div class="logo-area">
        <div class="logo-ring">
          <!-- Inline SVG brand mark — no base64, no XSS surface -->
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="18" cy="18" r="17" stroke="rgba(0,229,255,.35)" stroke-width="1.2"/>
            <path d="M10 22 C10 14 18 10 18 10 C18 10 26 14 26 22" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" fill="none"/>
            <circle cx="18" cy="22" r="3.5" fill="#00e5ff" opacity=".85"/>
            <path d="M14 26 Q18 24 22 26" stroke="#00e5ff" stroke-width="1.5" stroke-linecap="round" fill="none" opacity=".5"/>
          </svg>
        </div>
        <div class="brand">Luazul</div>
        <div class="brand-sub">Smart Travel &middot; Ops Portal</div>
        <div class="badge">Acceso Autorizado</div>
      </div>

      <div class="divider"></div>

      <!-- Login Form — ES5: no onsubmit inline, wired in JS -->
      <div id="loginForm">

        <!-- Email -->
        <div class="fgroup">
          <label class="flabel" for="userInput">Email</label>
          <div class="iw">
            <svg class="iico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="email" id="userInput" class="finput" placeholder="tu@email.com" autocomplete="email" required/>
          </div>
        </div>

        <!-- Contraseña -->
        <div class="fgroup">
          <label class="flabel" for="passInput">Contrase&ntilde;a</label>
          <div class="iw">
            <svg class="iico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="passInput" class="finput" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="current-password" required/>
            <button type="button" id="eyeBtn" class="ptoggle" aria-label="Mostrar contrase&ntilde;a">
              <svg id="eyeIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="button" id="loginBtn" class="btn-login">
          <span class="btn-inner">
            <div class="spinner" id="spinner"></div>
            <span id="btnLabel">Ingresar al Portal</span>
          </span>
        </button>

        <!-- Forgot password -->
        <button type="button" id="forgotToggleBtn" class="forgot-btn">
          &iquest;Olvidaste tu contrase&ntilde;a?
        </button>

        <div id="forgotWrap">
          <p class="forgot-hint">Ingres&aacute; tu email y te enviamos un link de recuperaci&oacute;n.</p>
          <input type="email" id="forgotEmail" class="forgot-input" placeholder="tu@email.com" autocomplete="email"/>
          <button type="button" id="forgotSendBtn" class="btn-forgot-send">Enviar link de recuperaci&oacute;n</button>
          <div id="forgotOk">&#x2705; Email enviado &mdash; revis&aacute; tu bandeja de entrada</div>
          <div id="forgotErr"></div>
        </div>

        <!-- Error banner — texto inyectado via textContent, no innerHTML -->
        <div class="err" id="loginErr" role="alert" aria-live="assertive">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="errMsg"></span>
        </div>

      </div><!-- /#loginForm -->

      <!-- Footer -->
      <div class="cfoot">
        <div class="fnote">
          Acceso exclusivo para <strong>personal autorizado</strong>.<br/>
          Sistema interno LUAZUL Smart Travel.
        </div>
        <div class="fver">Supabase Auth &middot; profiles &middot; ES5 Canon &middot; v3.32.2</div>
      </div>

    </div><!-- /.card -->
  </div><!-- /.wrap -->


  <!-- ── SUPABASE SDK (UMD) ── -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8/dist/umd/supabase.min.js"></script>

  <!-- ── SUPABASE CONFIG ── -->
  <script>
    var SUPABASE_URL = 'https://yunvqgaljopirzvjrntc.supabase.co';
    var SUPABASE_KEY = 'sb_publishable_MqB2thv0uzVUAY2v2jh-uQ_ul6a2LzB';
    var sbClient = (typeof supabase !== 'undefined')
      ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
      : null;
  </script>

  <!-- ================================================================
       STAFF LOGIN — CORE JS
       AUDIT v3.31 COMPLIANCE:
         C1  — No MASTER_USERS, no hardcoded credentials
         A1  — sendReset uses .then/.catch only (no async/await)
         A2  — No local login fallback in production
         M1  — dlPage() removed entirely
         M2  — Rate limiting on login attempts
         M3  — No plain-text password comparison
         P1  — esc() for output; all user content via textContent
         P8  — Unified redirect via getRedirectByRoleId()
         ES5 — Only var/function; no const/let/=>/backticks/forEach/Set/find
         UUID — All IDs wrapped in String(), no parseInt on UUIDs
  ================================================================ -->
  <script>
  'use strict';

  /* ────────────────────────────────────────────────────
     1. XSS PREVENTION (FIX P1)
     All dynamic text is output via textContent or esc().
     esc() is provided for contexts that require innerHTML
     (currently: none — kept as utility for other panels).
  ──────────────────────────────────────────────────── */
  function esc(str) {
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(String(str || '')));
    return d.innerHTML;
  }

  /* ────────────────────────────────────────────────────
     2. SESSION STORAGE — OBFUSCATED WRITE/READ (FIX P8)
     Sensitive fields (user_id, role_id) stored via btoa().
     Legacy fields (lz_role, lz_auth) kept plain for
     backward-compat with existing panels.
  ──────────────────────────────────────────────────── */
  function lzSet(key, val) {
    try {
      sessionStorage.setItem(key, btoa(encodeURIComponent(String(val))));
    } catch (e) { /* private browsing quota */ }
  }
  function lzSetPlain(key, val) {
    try {
      sessionStorage.setItem(key, String(val));
    } catch (e) {}
  }

  /* ────────────────────────────────────────────────────
     3. REDIRECT BY ROLE_ID (FIX P8 — Unified, no duplication)
     role_id comes from vendedores.role_id (integer):
       1 → ceo_luazul.html
       2 → gerente_luazul.html
       3 → admin_luazul.html
  ──────────────────────────────────────────────────── */
  function getRedirectByRoleId(roleId) {
    var id = parseInt(String(roleId), 10) || 3;
    if (id === 1) { return 'ceo_luazul.html';     }
    if (id === 2) { return 'gerente_luazul.html';  }
    if (id === 3) { return 'admin_luazul.html';    }
    return 'admin_luazul.html'; /* default / unknown */
  }

  /* Role name string — for lz_role key (panels read this) */
  function getRoleName(roleId) {
    var id = parseInt(String(roleId), 10) || 3;
    if (id === 1) { return 'owner';   }
    if (id === 2) { return 'manager'; }
    if (id === 3) { return 'admin';   }
    return 'seller';
  }

  /* ────────────────────────────────────────────────────
     4. RATE LIMITING (FIX M2)
  ──────────────────────────────────────────────────── */
  var _attempts   = 0;
  var _lockUntil  = 0;
  var MAX_ATTEMPTS = 5;
  var LOCK_MS      = 300000; /* 5 minutes */

  function isRateLimited() {
    var now = Date.now();
    if (now >= _lockUntil) { _attempts = 0; }
    return (_attempts >= MAX_ATTEMPTS && now < _lockUntil);
  }
  function recordFailure() {
    _attempts = _attempts + 1;
    if (_attempts >= MAX_ATTEMPTS) { _lockUntil = Date.now() + LOCK_MS; }
  }
  function resetAttempts() { _attempts = 0; _lockUntil = 0; }

  /* ────────────────────────────────────────────────────
     5. UI HELPERS
  ──────────────────────────────────────────────────── */
  var _busy = false;

  function showErr(msg) {
    var el = document.getElementById('loginErr');
    var em = document.getElementById('errMsg');
    if (em) { em.textContent = String(msg || 'Error desconocido.'); } /* textContent — no XSS */
    if (el) {
      el.classList.add('show');
      setTimeout(function () { el.classList.remove('show'); }, 5000);
    }
  }

  function setLoading(on) {
    _busy = on;
    var btn = document.getElementById('loginBtn');
    var lbl = document.getElementById('btnLabel');
    if (btn) { btn.disabled = on; btn.classList.toggle('loading', on); }
    if (lbl) { lbl.textContent = on ? 'Verificando...' : 'Ingresar al Portal'; }
  }

  function setBtnText(msg) {
    var lbl = document.getElementById('btnLabel');
    if (lbl) { lbl.textContent = String(msg || ''); }
  }

  /* ────────────────────────────────────────────────────
     6. MAIN LOGIN HANDLER (FIX C1, A2, P1, ES5)
     — Only Supabase Auth; no local fallback in production.
     — Queries profiles for role_id (Integer 1/2/3).
     — All UUID comparisons use String().
  ──────────────────────────────────────────────────── */
  function handleLogin() {
    if (_busy) { return; }

    var email = (document.getElementById('userInput').value  || '').toLowerCase().trim();
    var pass  = (document.getElementById('passInput').value  || '');

    if (!email || !pass) {
      showErr('Complet\u00e1 email y contrase\u00f1a.');
      return;
    }

    if (isRateLimited()) {
      var secs = Math.ceil((_lockUntil - Date.now()) / 1000);
      showErr('Demasiados intentos. Esper\u00e1 ' + secs + ' segundos.');
      return;
    }

    if (!sbClient) {
      showErr('Error de conexi\u00f3n. Recarg\u00e1 la p\u00e1gina.');
      return;
    }

    setLoading(true);

    /* ── STEP 1: Supabase Auth ── */
    sbClient.auth.signInWithPassword({ email: email, password: pass })
      .then(function (res) {
        if (res.error) {
          recordFailure();
          showErr('Email o contrase\u00f1a incorrectos.');
          setLoading(false);
          return;
        }

        var userId = String(res.data.user.id);   /* UUID always as String — FIX UUID */

        /* ── STEP 2: Fetch role from profiles ── */
        sbClient
          .from('staff_profiles')
          .select('id, nombre, apellido, role_id, email')
          .eq('id', userId)                      /* String UUID — columna PK 'id' — FIX UUID */
          .single()
          .then(function (vRes) {
            if (vRes.error || !vRes.data) {
              /* Profile record not found — access denied */
              showErr('Perfil no encontrado. Contact\u00e1 al administrador.');
              setLoading(false);
              sbClient.auth.signOut();
              return;
            }

            var v      = vRes.data;
            var roleId = parseInt(String(v.role_id || 3), 10) || 3;
            var nombre = ((v.nombre || '') + ' ' + (v.apellido || '')).trim()
                         || email.split('@')[0];

            /* ── STEP 3: Persist session (ROUTING MATRIX) ──
               Role 1 CEO     → lz_auth: 'true'      → ceo_luazul.html
               Role 2 Gerente → luazul_gerente: '1'   → gerente_luazul.html
               Role 3 Vendor  → lz_auth: 'true'      → admin_luazul.html
            ──────────────────────────────────────────────── */
            /* Sensitive fields obfuscated (FIX P8) */
            lzSet('lz_user_id',  userId);         /* btoa-encoded UUID */
            lzSet('lz_role_id',  String(roleId)); /* btoa-encoded role_id */

            /* Universal plain keys — required by existing panel guards */
            lzSetPlain('lz_auth',     'true');
            lzSetPlain('lz_role',     getRoleName(roleId));
            lzSetPlain('lz_nombre',   nombre);
            lzSetPlain('lz_email',    email);
            lzSetPlain('lz_supabase', 'true');

            /* Role-specific key — gerente_luazul.html reads luazul_gerente */
            if (roleId === 2) {
              lzSetPlain('luazul_gerente', '1');
            }

            resetAttempts();

            var firstName = nombre.split(' ')[0];
            setBtnText('\u2713 Bienvenido/a ' + firstName + '...');

            var dest = getRedirectByRoleId(roleId);
            setTimeout(function () { window.location.href = dest; }, 700);
          })
          .catch(function () {
            showErr('Error al obtener el perfil. Verific\u00e1 tu conexi\u00f3n.');
            setLoading(false);
          });
      })
      .catch(function () {
        showErr('Error de conexi\u00f3n. Verific\u00e1 tu internet.');
        setLoading(false);
      });
  }

  /* ────────────────────────────────────────────────────
     7. PASSWORD RESET — .then/.catch ONLY (FIX A1)
     No async/await used anywhere in this file.
  ──────────────────────────────────────────────────── */
  function sendReset() {
    var email  = (document.getElementById('forgotEmail').value || '').trim();
    var okEl   = document.getElementById('forgotOk');
    var errEl  = document.getElementById('forgotErr');
    var btn    = document.getElementById('forgotSendBtn');

    /* Reset feedback */
    if (okEl)  { okEl.style.display  = 'none'; }
    if (errEl) { errEl.style.display = 'none'; errEl.textContent = ''; }

    if (!email) {
      if (errEl) { errEl.style.display = 'block'; errEl.textContent = 'Ingres\u00e1 tu email.'; }
      return;
    }

    if (!sbClient) {
      if (errEl) { errEl.style.display = 'block'; errEl.textContent = 'Sin conexi\u00f3n con el servidor.'; }
      return;
    }

    if (btn) { btn.disabled = true; btn.textContent = 'Enviando...'; }

    sbClient.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/reset_password.html'
    })
    .then(function (result) {
      if (result.error) {
        if (errEl) {
          errEl.style.display = 'block';
          errEl.textContent   = 'No se pudo enviar: ' + result.error.message; /* textContent — no XSS */
        }
      } else {
        if (okEl) { okEl.style.display = 'block'; }
      }
      if (btn) { btn.disabled = false; btn.textContent = 'Enviar link de recuperaci\u00f3n'; }
    })
    .catch(function () {
      if (errEl) {
        errEl.style.display = 'block';
        errEl.textContent   = 'Error al enviar. Verific\u00e1 tu conexi\u00f3n.';
      }
      if (btn) { btn.disabled = false; btn.textContent = 'Enviar link de recuperaci\u00f3n'; }
    });
  }

  /* ────────────────────────────────────────────────────
     8. PASSWORD TOGGLE
     Uses setAttribute() for src; EyeIcon paths set via
     textContent-safe SVG attribute manipulation.
     NOTE: ico.innerHTML is used ONLY for SVG paths
     which are hardcoded strings, not user data — safe.
  ──────────────────────────────────────────────────── */
  function togglePass() {
    var inp = document.getElementById('passInput');
    var ico = document.getElementById('eyeIcon');
    if (!inp) { return; }
    var showing = (inp.type === 'password');
    inp.type = showing ? 'text' : 'password';
    if (ico) {
      /* Hardcoded SVG path strings — not user data — acceptable innerHTML */
      ico.innerHTML = showing
        ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
        : '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>';
    }
    var btn = document.getElementById('eyeBtn');
    if (btn) { btn.setAttribute('aria-label', showing ? 'Ocultar contrase\u00f1a' : 'Mostrar contrase\u00f1a'); }
  }

  /* ────────────────────────────────────────────────────
     9. FORGOT PANEL TOGGLE
  ──────────────────────────────────────────────────── */
  function toggleForgot() {
    var wrap   = document.getElementById('forgotWrap');
    var isOpen = (wrap.style.display === 'block');
    wrap.style.display = isOpen ? 'none' : 'block';
    if (!isOpen) {
      var loginEmail = (document.getElementById('userInput').value || '').trim();
      var fe = document.getElementById('forgotEmail');
      if (loginEmail) { fe.value = loginEmail; }
      fe.focus();
    }
  }

  /* ────────────────────────────────────────────────────
     10. DOM WIRING — addEventListener only (no inline
     event attributes in HTML, which could be XSS vectors)
  ──────────────────────────────────────────────────── */
  document.addEventListener('DOMContentLoaded', function () {

    /* Login button */
    var loginBtn = document.getElementById('loginBtn');
    if (loginBtn) {
      loginBtn.addEventListener('click', function () { handleLogin(); });
    }

    /* Enter key on inputs triggers login */
    var userInput = document.getElementById('userInput');
    var passInput = document.getElementById('passInput');
    function onEnter(e) {
      if (e.key === 'Enter' || e.keyCode === 13) { handleLogin(); }
    }
    if (userInput) {
      userInput.addEventListener('keydown', onEnter);
      setTimeout(function () { userInput.focus(); }, 300);
    }
    if (passInput) {
      passInput.addEventListener('keydown', onEnter);
    }

    /* Eye toggle */
    var eyeBtn = document.getElementById('eyeBtn');
    if (eyeBtn) { eyeBtn.addEventListener('click', togglePass); }

    /* Forgot panel toggle */
    var forgotToggle = document.getElementById('forgotToggleBtn');
    if (forgotToggle) { forgotToggle.addEventListener('click', toggleForgot); }

    /* Forgot send */
    var forgotSend = document.getElementById('forgotSendBtn');
    if (forgotSend) { forgotSend.addEventListener('click', sendReset); }

  });

  /* dlPage() REMOVED — FIX M1: Downloading page would expose Supabase key */

  </script>

        navigator.serviceWorker.register('sw.js')
          .then(function (reg) { console.log('[LUAZUL PWA] SW registrado', reg.scope); })
          .catch(function (err) { console.log('[LUAZUL PWA] SW no disponible', err); });
      });
    }
  </script>
