    body::before{content:'';position:fixed;inset:0;background:var(--bg-overlay);z-index:0;pointer-events:none;}
    .orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;}
    .orb-1{width:400px;height:400px;top:-100px;left:-100px;background:radial-gradient(circle,rgba(11,61,145,.18),transparent 70%);animation:orb1 20s ease-in-out infinite alternate;}
    .orb-2{width:300px;height:300px;bottom:-80px;right:-80px;background:radial-gradient(circle,rgba(30,80,200,.14),transparent 70%);animation:orb2 16s ease-in-out infinite alternate;}
    @keyframes orb1{from{transform:translate(0,0)}to{transform:translate(40px,30px)}}
    @keyframes orb2{from{transform:translate(0,0)}to{transform:translate(-30px,-20px)}}
    .wrap{position:relative;z-index:10;width:100%;max-width:460px;animation:fadeUp .7s cubic-bezier(.22,1,.36,1) both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
    .card{
      background:var(--card-bg);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      border:1px solid var(--card-bdr);border-radius:24px;
      box-shadow:0 24px 80px rgba(0,0,0,.65),0 0 0 1px rgba(126,184,255,.05);
      padding:50px 44px 42px;position:relative;overflow:hidden;
    }
    .card::before{
      content:'';position:absolute;top:0;left:15%;right:15%;height:1px;
      background:linear-gradient(90deg,transparent,rgba(126,184,255,.5),transparent);
    }
    .logo-area{text-align:center;margin-bottom:22px;}
    .logo-area img{
      height:90px;width:90px;border-radius:50%;object-fit:contain;
      animation:glowPulse 3s ease-in-out infinite;display:block;margin:0 auto 14px;
    }
    @keyframes glowPulse{
      0%,100%{filter:drop-shadow(0 4px 20px rgba(80,140,255,.5)) brightness(1.1)}
      50%{filter:drop-shadow(0 4px 38px rgba(80,180,255,.85)) brightness(1.28)}
    }
    .brand{font-size:1.5rem;font-weight:900;letter-spacing:3px;color:var(--text);line-height:1.1;margin-bottom:2px;}
    .brand-sub{font-size:.6rem;font-weight:600;letter-spacing:3.5px;text-transform:uppercase;color:var(--blue-acc);opacity:.9;margin-bottom:6px;}
    .page-title{font-size:.82rem;font-weight:700;letter-spacing:1px;color:var(--muted);margin-bottom:28px;text-align:center;}
    .fgroup{margin-bottom:18px;}
    .flabel{display:block;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--faint);margin-bottom:7px;}
    .iw{position:relative;}
    .iico{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--faint);pointer-events:none;}
    .finput{
      width:100%;padding:14px 44px 14px 42px;
      background:rgba(10,30,80,.55);border:1px solid rgba(80,130,220,.28);
      border-radius:12px;color:var(--text);font-family:'Montserrat',sans-serif;
      font-size:.92rem;font-weight:500;transition:border-color .2s,box-shadow .2s;outline:none;
    }
    .finput::placeholder{color:rgba(100,150,220,.35);}
    .finput:focus{border-color:rgba(100,180,255,.7);box-shadow:0 0 0 3px rgba(50,130,255,.18);}
    .ptoggle{
      position:absolute;right:12px;top:50%;transform:translateY(-50%);
      background:none;border:none;color:var(--faint);cursor:pointer;padding:4px;
      display:flex;align-items:center;justify-content:center;transition:color .2s;
    }
    .ptoggle:hover{color:var(--blue-acc);}
    .strength-bar{height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:8px;overflow:hidden;}
    .strength-fill{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0%;}
    .strength-label{font-size:.62rem;color:var(--muted);margin-top:4px;min-height:14px;}
    .btn-reset{
      width:100%;padding:15px;margin-top:8px;
      background:linear-gradient(135deg,var(--blue-deep),var(--blue-mid));
      border:none;border-radius:12px;color:#fff;
      font-family:'Montserrat',sans-serif;font-size:.92rem;font-weight:700;
      letter-spacing:.05em;text-transform:uppercase;cursor:pointer;
      transition:transform .25s,box-shadow .25s;position:relative;overflow:hidden;
    }
    .btn-reset:hover{transform:translateY(-3px);box-shadow:0 12px 35px rgba(11,61,145,.65);}
    .btn-reset:active{transform:translateY(0);}
    .btn-reset.loading .btn-inner .blabel{opacity:0;}
    .btn-inner{display:flex;align-items:center;justify-content:center;gap:10px;position:relative;}
    .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;position:absolute;opacity:0;}
    .btn-reset.loading .spinner{opacity:1;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .err{
      display:none;margin-top:14px;padding:11px 14px;border-radius:10px;
      background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);
      color:var(--danger);font-size:.78rem;font-weight:600;
      display:none;align-items:center;gap:8px;
    }
    .err.show{display:flex;}
    .success-box{
      display:none;text-align:center;padding:20px 0 8px;
    }
    .success-box .icon{font-size:3rem;margin-bottom:12px;}
    .success-box h3{font-size:1.1rem;font-weight:800;color:var(--green);margin-bottom:8px;}
    .success-box p{font-size:.82rem;color:var(--muted);line-height:1.6;}
    .btn-login-link{
      display:inline-block;margin-top:18px;padding:11px 24px;
      background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);
      border-radius:10px;color:var(--green);font-weight:700;font-size:.82rem;
      text-decoration:none;transition:all .2s;cursor:pointer;
    }
    .btn-login-link:hover{background:rgba(74,222,128,.2);}
    .cfoot{margin-top:24px;text-align:center;}
    .fnote{font-size:.65rem;color:var(--faint);line-height:1.6;}
    @media(max-width:500px){.card{padding:38px 22px 34px;}.brand{font-size:1.2rem;}}
  </style>

  <script>
    var busy = false;
    var sessionReady = false;

    // ── SUPABASE v2: soporte para ambos formatos de token ─────────────
    // Supabase puede enviar el token como:
    //   1. Query params: ?token=XXX&type=recovery  (formato PKCE / nuevo)
    //   2. Hash fragment: #access_token=XXX        (formato legacy)
    // Manejamos ambos casos.

    async function initRecovery() {
      var btn = document.getElementById('resetBtn');
      if (btn) { btn.disabled = true; btn.style.opacity = '.5'; }

      // Caso 1: token en query params (?token=...&type=recovery)
      var params = new URLSearchParams(window.location.search);
      var token = params.get('token');
      var type  = params.get('type');

      if (token && type === 'recovery') {
        try {
          var result = await sbClient.auth.verifyOtp({
            token_hash: token,
            type: 'recovery'
          });
          if (result.error) throw result.error;
          sessionReady = true;
          if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
          return;
        } catch(e) {
          showErr('El enlace de recuperación no es válido o ya expiró. Pedí uno nuevo desde el login.');
          return;
        }
      }

      // Caso 2: token en hash fragment (#access_token=...&type=recovery)
      // El SDK lo procesa automáticamente y dispara PASSWORD_RECOVERY
      var hash = window.location.hash;
      if (hash && hash.includes('type=recovery')) {
        // Esperar el evento del SDK
        setTimeout(function() {
          if (!sessionReady) {
            showErr('El enlace de recuperación no es válido o ya expiró. Pedí uno nuevo desde el login.');
          }
        }, 4000);
        return;
      }

      // Sin token de ningún tipo
      setTimeout(function() {
        showErr('El enlace de recuperación no es válido o ya expiró. Pedí uno nuevo desde el login.');
      }, 500);
    }

    sbClient.auth.onAuthStateChange(function(event, session) {
      if (event === 'PASSWORD_RECOVERY') {
        sessionReady = true;
        var errBox = document.getElementById('errBox');
        if (errBox) errBox.classList.remove('show');
        var btn = document.getElementById('resetBtn');
        if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
      }
    });

    window.addEventListener('DOMContentLoaded', function() {
      initRecovery();
    });

    function checkStrength(val) {
      var bar   = document.getElementById('sBar');
      var label = document.getElementById('sLabel');
      var score = 0;
      if (val.length >= 8)  score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      var colors  = ['#ef4444','#f97316','#eab308','#4ade80'];
      var labels  = ['Muy débil','Débil','Aceptable','Segura'];
      var widths  = ['25%','50%','75%','100%'];
      if (!val) { bar.style.width='0'; label.textContent=''; return; }
      bar.style.width   = widths[score-1]  || '25%';
      bar.style.background = colors[score-1]  || '#ef4444';
      label.textContent = labels[score-1]  || 'Muy débil';
      label.style.color = colors[score-1]  || '#ef4444';
    }

    function togglePass(id, eyeId) {
      var inp = document.getElementById(id);
      var ico = document.getElementById(eyeId);
      var show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      ico.innerHTML = show
        ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
        : '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>';
    }

    function showErr(msg) {
      var box = document.getElementById('errBox');
      var txt = document.getElementById('errMsg');
      txt.textContent = msg;
      box.classList.add('show');
    }

    function setLoading(on) {
      busy = on;
      var btn   = document.getElementById('resetBtn');
      var label = document.getElementById('btnLabel');
      var spin  = document.getElementById('spinner');
      btn.classList.toggle('loading', on);
      label.textContent = on ? 'Guardando...' : 'Guardar nueva contraseña';
    }

    async function doReset() {
      if (busy) return;
      var p1 = document.getElementById('pass1').value.trim();
      var p2 = document.getElementById('pass2').value.trim();
      document.getElementById('errBox').classList.remove('show');

      if (!p1 || p1.length < 8) {
        showErr('La contraseña debe tener al menos 8 caracteres.');
        return;
      }
      if (p1 !== p2) {
        showErr('Las contraseñas no coinciden. Volvé a escribirlas.');
        return;
      }

      if (!sessionReady) {
        showErr('La sesión de recuperación no está lista. Esperá un momento o pedí un nuevo link.');
        return;
      }

      setLoading(true);

      try {
        // onAuthStateChange ya estableció la sesión — solo actualizar contraseña
        var result = await sbClient.auth.updateUser({ password: p1 });
        if (result.error) {
          showErr('No se pudo actualizar: ' + result.error.message);
          setLoading(false);
          return;
        }

        // Éxito — cerrar sesión para que ingrese limpio
        await sbClient.auth.signOut();
        document.getElementById('formWrap').style.display = 'none';
        document.getElementById('successBox').style.display = 'block';
        // Mensaje con cuenta regresiva
        var successMsg = document.querySelector('#successBox p');
        if (successMsg) {
          successMsg.innerHTML = 'Tu nueva contraseña fue guardada correctamente.<br/>Serás redirigido al login en unos segundos...';
        }
        // Redirección automática a los 2 segundos
        setTimeout(function() {
          window.location.href = 'staff_login.html';
        }, 2000);

      } catch(e) {
        showErr('Error inesperado. Intentá de nuevo.');
        setLoading(false);
      }
    }
  </script>
</body>
</html>
